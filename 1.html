           <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-orange-100 hover:shadow-md transition-shadow">
             <div className="mx-auto text-amber-600 mb-4 flex justify-center"><Icon name="utensils" size={40} /></div>
             <h3 className="text-lg md:text-xl font-bold text-amber-900 mb-2">Authentic Taste</h3>
             <p className="text-gray-600 text-sm md:text-base">Enjoy perfectly spiced Mandi, Biryani, and Tandoori dishes prepared by expert chefs.</p>
           </div>
           <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-orange-100 hover:shadow-md transition-shadow">
             <div className="mx-auto text-amber-600 mb-4 flex justify-center"><Icon name="coffee" size={40} /></div>
             <h3 className="text-lg md:text-xl font-bold text-amber-900 mb-2">Premium Drinks</h3>
             <p className="text-gray-600 text-sm md:text-base">Savor our wide selection of great coffees, fresh juices, and signature smoothies.</p>
           </div>
           <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-orange-100 hover:shadow-md transition-shadow sm:col-span-2 md:col-span-1">
             <div className="mx-auto text-amber-600 mb-4 flex justify-center"><Icon name="map-pin" size={40} /></div>
             <h3 className="text-lg md:text-xl font-bold text-amber-900 mb-2">Prime Location</h3>
             <p className="text-gray-600 text-sm md:text-base">Dine-in at Kn 81 et, Kigali, featuring outdoor and rooftop seating.</p>
           </div>
        </div>
      </div>
    );

    const MenuPage = () => {
      const [activeCategory, setActiveCategory] = useState(menuData[0].id);
      const [searchQuery, setSearchQuery] = useState('');

      const filteredMenu = useMemo(() => {
        if (!searchQuery.trim()) return menuData;
        return menuData.map(category => {
          const filteredItems = category.items.filter(item => 
            item.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
            item.desc.toLowerCase().includes(searchQuery.toLowerCase())
          );
          return { ...category, items: filteredItems };
        }).filter(category => category.items.length > 0);
      }, [searchQuery]);

      const displayCategories = searchQuery ? filteredMenu : menuData.filter(c => c.id === activeCategory);

      return (
        <div className="animate-fade-in-up">
          <div className="relative mb-6 md:mb-8 max-w-xl mx-auto">
            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <Icon name="search" size={20} className="text-gray-400" />
            </div>
            <input
              type="text"
              className="block w-full pl-12 pr-4 py-3 md:py-4 rounded-full border-none ring-2 ring-amber-200 focus:ring-amber-500 bg-white shadow-sm text-base md:text-lg outline-none transition-all"
              placeholder="Search for Mandi, Biryani..."
              value={searchQuery}
              onChange={(e) => setSearchQuery(e.target.value)}
            />
            {searchQuery && (
              <button 
                onClick={() => setSearchQuery('')}
                className="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600"
              >
                <Icon name="x" size={20} />
              </button>
            )}
          </div>

          {!searchQuery && (
            <div className="flex overflow-x-auto pb-4 mb-6 md:mb-8 gap-2 md:gap-3 scrollbar-hide snap-x">
              {menuData.map(category => (
                <button
                  key={category.id}
                  onClick={() => setActiveCategory(category.id)}
                  className={`snap-start shrink-0 px-4 md:px-6 py-2 md:py-3 rounded-full flex items-center gap-2 font-semibold text-sm transition-all shadow-sm ${
                    activeCategory === category.id 
                      ? 'bg-amber-600 text-white shadow-amber-600/30 ring-2 ring-amber-600 ring-offset-2 ring-offset-orange-50' 
                      : 'bg-white text-gray-600 hover:bg-amber-50 hover:text-amber-800'
                  }`}
                >
                  {category.icon}
                  {category.title}
                </button>
              ))}
            </div>
          )}

          <div className="space-y-10 md:space-y-12">
            {displayCategories.map(category => (
              <section key={category.id} className="animate-fade-in-up">
                <h2 className="text-xl md:text-2xl font-bold text-amber-900 mb-4 md:mb-6 flex items-center gap-2 border-b-2 border-amber-200 pb-2">
                  {category.title}
                  <span className="text-xs md:text-sm font-normal text-gray-500 bg-amber-100 px-3 py-1 rounded-full">
                    {category.items.length} items
                  </span>
                </h2>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                  {category.items.map(item => (
                    <div 
                      key={item.id} 
                      className="bg-white rounded-2xl p-4 md:p-5 shadow-sm border border-orange-100 hover:shadow-md hover:border-amber-300 transition-all flex flex-col justify-between group"
                    >
                      <div className="flex justify-between items-start gap-3 md:gap-4 mb-2">
                        <h3 className="font-bold text-base md:text-lg text-gray-800 leading-tight group-hover:text-amber-700 transition-colors">
                          {item.name}
                        </h3>
                        <span className="font-black text-amber-600 whitespace-nowrap bg-orange-50 px-2 py-1 rounded-md text-sm">
                          {formatPrice(item.price)}
                        </span>
                      </div>
                      {item.desc && (
                        <p className="text-sm text-gray-500 line-clamp-2 mt-1">{item.desc}</p>
                      )}
                    </div>
                  ))}
                </div>
              </section>
            ))}
            
            {displayCategories.length === 0 && (
              <div className="text-center py-16 md:py-20">
                <div className="w-20 h-20 md:w-24 md:h-24 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4 text-orange-400">
                  <Icon name="search" size={40} />
                </div>
                <h3 className="text-lg md:text-xl font-bold text-gray-700 mb-2">No items found</h3>
                <p className="text-sm md:text-base text-gray-500">Try searching for something else like "Mandi" or "Pizza".</p>
                <button 
                  onClick={() => setSearchQuery('')}
                  className="mt-6 px-6 py-2 bg-amber-600 text-white rounded-full font-medium hover:bg-amber-700"
                >
                  Clear Search
                </button>
              </div>
            )}
          </div>
        </div>
      );
    };

    const GalleryPage = () => (
      <div className="animate-fade-in-up">
        <div className="text-center mb-8 md:mb-10">
          <h2 className="text-3xl md:text-4xl font-black text-amber-900 mb-3 md:mb-4">Our Gallery</h2>
          <p className="text-base md:text-lg text-gray-600 max-w-2xl mx-auto px-4">Take a peek at some of our delicious signature dishes and beverages.</p>
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
          {galleryImages.map((img, idx) => (
             <div key={idx} className="aspect-square rounded-2xl md:rounded-3xl overflow-hidden shadow-md border-4 border-white group relative bg-gray-200">
                {/* Image fits perfectly in the box using w-full h-full object-cover */}
                <img 
                  src={img.src} 
                  alt={img.alt} 
                  className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" 
                  onError={(e) => e.target.style.display='none'}
                />
                <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end justify-center pb-6">
                  <span className="text-white font-bold text-lg px-4 text-center">{img.alt}</span>
                </div>
             </div>
          ))}
        </div>
      </div>
    );

    const AboutPage = () => (
      <div className="animate-fade-in-up max-w-5xl mx-auto">
        <div className="text-center mb-8 md:mb-12">
          <h2 className="text-3xl md:text-4xl font-black text-amber-900 mb-3 md:mb-4">About Us</h2>
          <p className="text-base md:text-lg text-gray-600 max-w-2xl mx-auto px-4">Discover a comfortable and vibrant dining environment equipped with premium amenities to make your visit memorable.</p>
        </div>

        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
          <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-orange-100">
            <h3 className="text-lg md:text-xl font-bold text-amber-800 mb-4 flex items-center gap-2 border-b pb-2">
              <Icon name="check-circle" size={20} className="text-amber-600"/> Accessibility
            </h3>
            <ul className="space-y-3">
              <li className="flex gap-3 text-sm md:text-base text-gray-700 items-start"><Icon name="check-circle" size={18} className="text-green-500 shrink-0 mt-0.5"/> Wheelchair-accessible car park</li>
              <li className="flex gap-3 text-sm md:text-base text-gray-700 items-start"><Icon name="check-circle" size={18} className="text-green-500 shrink-0 mt-0.5"/> Wheelchair-accessible entrance</li>
              <li className="flex gap-3 text-sm md:text-base text-gray-700 items-start"><Icon name="check-circle" size={18} className="text-green-500 shrink-0 mt-0.5"/> Wheelchair-accessible seating</li>
              <li className="flex gap-3 text-sm md:text-base text-gray-700 items-start"><Icon name="check-circle" size={18} className="text-green-500 shrink-0 mt-0.5"/> Wheelchair-accessible toilet</li>
            </ul>
          </div>

          <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-orange-100">
            <h3 className="text-lg md:text-xl font-bold text-amber-800 mb-4 flex items-center gap-2 border-b pb-2">
              <Icon name="utensils" size={20} className="text-amber-600"/> Service Options
            </h3>
            <ul className="space-y-3 grid grid-cols-1 sm:grid-cols-2">
              <li className="flex gap-2 text-sm md:text-base text-gray-700 items-center"><Icon name="check-circle" size={18} className="text-green-500 shrink-0"/> Outdoor seating</li>
              <li className="flex gap-2 text-sm md:text-base text-gray-700 items-center"><Icon name="check-circle" size={18} className="text-green-500 shrink-0"/> Delivery</li>
              <li className="flex gap-2 text-sm md:text-base text-gray-700 items-center"><Icon name="check-circle" size={18} className="text-green-500 shrink-0"/> Drive-through</li>
              <li className="flex gap-2 text-sm md:text-base text-gray-700 items-center"><Icon name="check-circle" size={18} className="text-green-500 shrink-0"/> Takeaway</li>
              <li className="flex gap-2 text-sm md:text-base text-gray-700 items-center"><Icon name="check-circle" size={18} className="text-green-500 shrink-0"/> Dine-in</li>
            </ul>
          </div>

          <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-orange-100">
            <h3 className="text-lg md:text-xl font-bold text-amber-800 mb-4 flex items-center gap-2 border-b pb-2">
              <Icon name="check-circle" size={20} className="text-amber-600"/> Highlights
            </h3>
            <ul className="space-y-3 grid grid-cols-1 sm:grid-cols-2 gap-x-4">
              <li className="flex gap-2 text-sm md:text-base text-gray-700 items-center"><Icon name="check-circle" size={18} className="text-green-500 shrink-0"/> Fireplace</li>
              <li className="flex gap-2 text-sm md:text-base text-gray-700 items-center"><Icon name="check-circle" size={18} className="text-green-500 shrink-0"/> Rooftop seating</li>
              <li className="flex gap-2 text-sm md:text-base text-gray-700 items-center"><Icon name="check-circle" size={18} className="text-green-500 shrink-0"/> Great cocktails</li>
              <li className="flex gap-2 text-sm md:text-base text-gray-700 items-center"><Icon name="check-circle" size={18} className="text-green-500 shrink-0"/> Great coffee</li>
              <li className="flex gap-2 text-sm md:text-base text-gray-700 items-center"><Icon name="check-circle" size={18} className="text-green-500 shrink-0"/> Great dessert</li>
              <li className="flex gap-2 text-sm md:text-base text-gray-700 items-center"><Icon name="check-circle" size={18} className="text-green-500 shrink-0"/> Great tea selection</li>
              <li className="flex gap-2 text-sm md:text-base text-gray-700 items-center"><Icon name="check-circle" size={18} className="text-green-500 shrink-0"/> Sport</li>
            </ul>
          </div>

          <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-orange-100">
            <h3 className="text-lg md:text-xl font-bold text-amber-800 mb-4 flex items-center gap-2 border-b pb-2">
              <Icon name="check-circle" size={20} className="text-amber-600"/> Popular for
            </h3>
            <ul className="space-y-3 grid grid-cols-1 sm:grid-cols-2">
              <li className="flex gap-2 text-sm md:text-base text-gray-700 items-center"><Icon name="check-circle" size={18} className="text-green-500 shrink-0"/> Breakfast</li>
              <li className="flex gap-2 text-sm md:text-base text-gray-700 items-center"><Icon name="check-circle" size={18} className="text-green-500 shrink-0"/> Lunch</li>
              <li className="flex gap-2 text-sm md:text-base text-gray-700 items-center"><Icon name="check-circle" size={18} className="text-green-500 shrink-0"/> Dinner</li>
              <li className="flex gap-2 text-sm md:text-base text-gray-700 items-center"><Icon name="check-circle" size={18} className="text-green-500 shrink-0"/> Solo dining</li>
            </ul>
          </div>
        </div>
      </div>
    );

    const ContactPage = () => (
      <div className="animate-fade-in-up max-w-4xl mx-auto">
        <div className="text-center mb-8 md:mb-12">
          <h2 className="text-3xl md:text-4xl font-black text-amber-900 mb-3 md:mb-4">Contact & Location</h2>
          <p className="text-base md:text-lg text-gray-600 max-w-2xl mx-auto px-4">Reach out to us or drop by for a delightful meal.</p>
        </div>

        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
          <div className="space-y-4 md:space-y-6">
            <div className="bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-orange-100 flex items-start gap-4 transition-transform hover:-translate-y-1">
               <div className="bg-amber-100 p-3 rounded-full text-amber-700"><Icon name="map-pin" size={24}/></div>
               <div>
                 <h4 className="font-bold text-lg md:text-xl text-gray-800 mb-1">Our Location</h4>
                 <p className="text-gray-600 text-base md:text-lg">Kn 81 et, Kigali</p>
               </div>
            </div>
            
            <div className="bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-orange-100 flex items-start gap-4 transition-transform hover:-translate-y-1">
               <div className="bg-amber-100 p-3 rounded-full text-amber-700"><Icon name="phone" size={24}/></div>
               <div>
                 <h4 className="font-bold text-lg md:text-xl text-gray-800 mb-1">Phone Number</h4>
                 <a href="tel:0786675051" className="text-amber-600 hover:text-amber-800 font-medium text-base md:text-lg">0786675051</a>
               </div>
            </div>
          </div>

          <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-orange-100">
             <h3 className="text-xl md:text-2xl font-bold text-amber-800 mb-4 md:mb-6 flex items-center gap-3 border-b pb-4">
               <Icon name="clock" size={24} className="text-amber-600"/> Opening Hours
             </h3>
             <ul className="space-y-3 md:space-y-4 text-sm md:text-base text-gray-700">
               <li className="flex justify-between items-center border-b border-gray-50 pb-2">
                 <span className="font-medium text-base md:text-lg">Thursday</span> <span className="font-semibold text-amber-900">9 am – 11:30 pm</span>
               </li>
               <li className="flex justify-between items-center border-b border-gray-50 pb-2">
                 <div>
                    <span className="font-medium text-base md:text-lg">Friday</span><br/>
                    <span className="text-xs text-amber-600 font-medium">(Good Friday) Hours might differ</span>
                 </div> 
                 <span className="font-semibold text-amber-900 text-right">9 am – 11:30 pm</span>
               </li>
               <li className="flex justify-between items-center border-b border-gray-50 pb-2">
                 <span className="font-medium text-base md:text-lg">Saturday</span> <span className="font-semibold text-amber-900">8 am – 11:30 pm</span>
               </li>
               <li className="flex justify-between items-center border-b border-gray-50 pb-2">
                 <span className="font-medium text-base md:text-lg">Sunday</span> <span className="font-semibold text-amber-900">9 am – 11:30 pm</span>
               </li>
               <li className="flex justify-between items-center border-b border-gray-50 pb-2">
                 <div>
                    <span className="font-medium text-base md:text-lg">Monday</span><br/>
                    <span className="text-xs text-amber-600 font-medium">(Easter Monday) Hours might differ</span>
                 </div> 
                 <span className="font-semibold text-amber-900 text-right">9 am – 11:30 pm</span>
               </li>
               <li className="flex justify-between items-center border-b border-gray-50 pb-2">
                 <div>
                    <span className="font-medium text-base md:text-lg">Tuesday</span><br/>
                    <span className="text-xs text-amber-600 font-medium">(Tutsi Genocide Memorial Day)<br/>Hours might differ</span>
                 </div> 
                 <span className="font-semibold text-amber-900 text-right">9 am – 11:30 pm</span>
               </li>
               <li className="flex justify-between items-center pt-1">
                 <span className="font-medium text-base md:text-lg">Wednesday</span> <span className="font-semibold text-amber-900">9 am – 11:30 pm</span>
               </li>
             </ul>
          </div>
        </div>
      </div>
    );

    function App() {
      const [activeTab, setActiveTab] = useState('home');

      return (
        <div className="min-h-screen bg-orange-50 font-sans text-gray-800 flex flex-col">
          <Header activeTab={activeTab} setActiveTab={setActiveTab} />
          
          <main className="flex-1 w-full max-w-7xl mx-auto px-4 py-6 md:py-8">
            {activeTab === 'home' && <HomePage setActiveTab={setActiveTab} />}
            {activeTab === 'menu' && <MenuPage />}
            {activeTab === 'gallery' && <GalleryPage />}
            {activeTab === 'about' && <AboutPage />}
            {activeTab === 'contact' && <ContactPage />}
          </main>

          <footer className="bg-amber-900 text-amber-100/60 py-6 text-center text-sm px-4">
             <p>© {new Date().getFullYear()} The House of Mandi, Kigali. All Rights Reserved.</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
